<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<script src="./support.js"></script>
</head>
<body>
<x-dc>
<helmet>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Archivo:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
  *{box-sizing:border-box;margin:0;padding:0}
  body{background:#141416;font-family:'Archivo',sans-serif;-webkit-font-smoothing:antialiased;display:block;padding:0}
  a{color:inherit;text-decoration:none}
  a:hover{color:inherit}
  @keyframes omFade{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:none}}
  .om-frame{animation:omFade .7s cubic-bezier(.2,.7,.2,1) both}
  .act{display:inline-block;padding:10px 4px;margin:-10px -4px;transition:transform .85s cubic-bezier(.16,.8,.28,1)}
  .act:hover{transform:translateY(-7px)}
  @keyframes tvFlicker{0%,100%{opacity:1}7%{opacity:.97}8%{opacity:.72}9%{opacity:.96}10%{opacity:.85}11%{opacity:1}49%{opacity:1}50%{opacity:.9}51%{opacity:1}80%{opacity:.99}81%{opacity:.68}82%{opacity:.94}83%{opacity:1}}
  .tv{text-shadow:1.1px 0 rgba(255,50,90,.6),-1.1px 0 rgba(0,178,255,.55),0 0 10px rgba(255,255,255,.14);animation:tvFlicker 5s steps(60) infinite}
  .home-nav{text-shadow:0.5px 0 rgba(255,50,90,.4),-0.5px 0 rgba(0,178,255,.35)}

  @media (max-width:768px){
    .mbr{display:block!important;width:0!important;height:0!important;overflow:hidden!important}
    .om-frame{height:100svh!important}
    .home-name{left:20px!important;top:18px!important}
    .home-name a{font-size:27px!important}
    .home-nav{top:50%!important;bottom:auto!important;right:20px!important;transform:translateY(-50%)!important;flex-direction:column!important;align-items:flex-end!important;gap:8px!important;text-align:right!important}
    .home-nav a{line-height:1.2!important}
    .home-nav{text-shadow:0.5px 0 rgba(255,50,90,.4),-0.5px 0 rgba(0,178,255,.35)!important}
    .home-actions{grid-template-columns:1fr!important;left:20px!important;right:20px!important;bottom:28px!important;gap:0!important}
    .home-actions a{text-align:left!important;font-size:17px!important;padding:11px 0!important}
  }
</style>
</helmet>
<div class="om-frame" style="position:relative;width:100vw;height:100vh;overflow:hidden;background:#0a0908;color:#efece7">
  <!-- full-bleed media -->
  <video src="assets/hero2.mp4" autoplay muted loop playsinline style="position:absolute;inset:0;width:100%;height:100%;object-fit:cover;background:#000;opacity:0;transition:opacity 1.4s ease"></video>
  <div style="position:absolute;inset:0;background:{{ overlayFade }}"></div>
  <!-- name -->
  <div class="home-name" style="position:absolute;left:22px;top:16px">
    <a class="tv" href="index.html" style="display:inline-block;font-size:40px;font-weight:600;letter-spacing:{{ nameTracking }};line-height:1.1;text-transform:uppercase">Andrea<br>Balency-Béarn</a>
  </div>
  <!-- top-right utility nav -->
  <nav class="cap home-nav" style="position:absolute;right:56px;top:60px;display:flex;gap:30px;font-size:12px;font-weight:500;letter-spacing:{{ labelTracking }};text-transform:uppercase;color:rgba(239,236,231,.78)">
    <a class="act" href="about.html">About / Contact</a>
    <a class="act" href="https://www.instagram.com/andreabalencybearn/" target="_blank" rel="noopener">Instagram</a>
  </nav>
  <!-- three options along the bottom -->
  <div class="home-actions" style="position:absolute;left:56px;right:56px;bottom:46px;display:grid;grid-template-columns:1fr 1fr 1fr">
    <a class="act tv" href="film.html" style="display:block;padding:20px 12px;text-align:center;font-size:15px;font-weight:400;letter-spacing:{{ labelTracking }};text-transform:uppercase">Film Music</a>
    <a class="act tv" href="concert.html" style="display:block;padding:20px 12px;text-align:center;font-size:15px;font-weight:400;letter-spacing:{{ labelTracking }};text-transform:uppercase">Concert Music /<span class="mbr"> </span>Live Works</a>
    <a class="act tv" href="https://mountkimbie.warp.net/" target="_blank" rel="noopener" style="display:block;padding:20px 12px;text-align:center;font-size:15px;font-weight:400;letter-spacing:{{ labelTracking }};text-transform:uppercase">Mount Kimbie</a>
  </div>
</div>
</x-dc>
<script type="text/x-dc" data-dc-script data-props="{
  &quot;$preview&quot;: {&quot;width&quot;: 1440, &quot;height&quot;: 900},
  &quot;labelTracking&quot;: {&quot;editor&quot;: &quot;range&quot;, &quot;default&quot;: 0.12, &quot;tsType&quot;: &quot;number&quot;, &quot;min&quot;: 0.02, &quot;max&quot;: 0.4, &quot;step&quot;: 0.01, &quot;unit&quot;: &quot;em&quot;, &quot;section&quot;: &quot;Typography&quot;},
  &quot;nameTracking&quot;: {&quot;editor&quot;: &quot;range&quot;, &quot;default&quot;: 0.05, &quot;tsType&quot;: &quot;number&quot;, &quot;min&quot;: -0.05, &quot;max&quot;: 0.15, &quot;step&quot;: 0.005, &quot;unit&quot;: &quot;em&quot;, &quot;section&quot;: &quot;Typography&quot;},
  &quot;overlayDarkness&quot;: {&quot;editor&quot;: &quot;range&quot;, &quot;default&quot;: 0.9, &quot;tsType&quot;: &quot;number&quot;, &quot;min&quot;: 0.4, &quot;max&quot;: 1, &quot;step&quot;: 0.05, &quot;section&quot;: &quot;Media&quot;}
}">class Component extends DCLogic {
  componentDidMount() {
    this._playHero();
    this._t = setInterval(() => this._playHero(), 800);
    setTimeout(() => { clearInterval(this._t); }, 6000);
  }
  componentWillUnmount() { clearInterval(this._t); }
  _playHero() {
    const v = document.querySelector('.om-frame video');
    if (!v) return;
    v.muted = true;
    v.defaultMuted = true;
    v.setAttribute('muted', '');
    v.playsInline = true;
    v.loop = true;
    v.setAttribute('loop', '');
    if (!v._loopFix) {
      v._loopFix = true;
      v.addEventListener('ended', () => { v.currentTime = 0; v.play().catch(() => {}); });
    }
    const p = v.play();
    if (p && p.catch) p.catch(() => {});
    if (v.readyState >= 3) v.style.opacity = '1';
    else v.addEventListener('playing', () => { v.style.opacity = '1'; }, { once: true });
  }
  renderVals() {
    const label = (this.props.labelTracking ?? 0.12) + 'em';
    const name = (this.props.nameTracking ?? 0.05) + 'em';
    const dark = this.props.overlayDarkness ?? 0.9;
    return {
      labelTracking: label,
      nameTracking: name,
      overlayFade: `linear-gradient(180deg,rgba(10,9,8,.55) 0%,rgba(10,9,8,.1) 30%,rgba(10,9,8,.35) 65%,rgba(10,9,8,${dark}) 100%)`
    };
  }
}</script>
</body>
</html>
